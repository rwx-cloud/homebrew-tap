on:
  pull_request:
    branches: [main]

jobs:
  test_rwx:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: rwx
            version: "3.16.0"
            os: macos-15-intel # intel
          - name: rwx
            version: "3.16.0"
            os: macos-15 # arm
    name: test_${{ matrix.name }}_${{ matrix.os }}
    steps:
      - uses: actions/checkout@v3

      - name: Install rwx & run it
        run: |
          set -o pipefail
          ! command -v rwx
          brew install ./Formula/${{ matrix.name }}.rb 2>&1 | tee install-output.txt
          rwx --version | grep ${{ matrix.version }}
        env:
          HOMEBREW_DEVELOPER: 1

      - name: Ensure the integrity was verified
        run: '! grep "Cannot verify integrity of" install-output.txt'

  test_rwx_linux:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: rwx
            version: "3.16.0"
            os: ubuntu-latest
          - name: rwx-unstable
            version: "unstable-"
            os: ubuntu-latest
    name: test_${{ matrix.name }}_${{ matrix.os }}
    steps:
      - uses: actions/checkout@v3

      - name: Install homebrew
        uses: Homebrew/actions/setup-homebrew@5caa94335a28d8fdf5a478ae8586f2da40a0a989
      - name: Configure Linux sandbox
        run: |
          sudo apt-get update
          sudo apt-get install --yes bubblewrap
          sudo sysctl -w kernel.unprivileged_userns_clone=1
          sudo sysctl -w user.max_user_namespaces=28633
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
      - name: Install rwx
        run: |
          set -o pipefail
          ! command -v rwx
          brew install ./Formula/${{ matrix.name }}.rb 2>&1 | tee install-output.txt
          rwx --version | grep ${{ matrix.version }}
        env:
          HOMEBREW_DEVELOPER: 1

      - name: Ensure the integrity was verified
        run: '! grep "Cannot verify integrity of" install-output.txt'
